<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Frank's Media Server</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:          #080c14;
            --card-bg:     rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.07);
            --card-hover:  rgba(255, 255, 255, 0.09);
            --text:        #e2e8f0;
            --muted:       #4b5563;
            --port-color:  #6b7280;
            --divider:     rgba(255, 255, 255, 0.06);
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(96, 165, 250, 0.12), transparent),
                radial-gradient(ellipse 50% 30% at 80% 90%,  rgba(167, 139, 250, 0.07), transparent);
            min-height: 100vh;
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            text-align: center;
            padding: 3rem 1.5rem 1.5rem;
        }

        header h1 {
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        #clock {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            font-variant-numeric: tabular-nums;
        }

        /* ── Section label ── */
        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0 1.5rem;
            margin-bottom: 0.75rem;
            max-width: 960px;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
        }

        /* ── Service grid ── */
        main {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            padding: 0.25rem 1.5rem 0;
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            align-content: start;
        }

        /* ── Service cards ── */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 1.5rem 1rem 1.25rem;
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease,
                        border-color 0.2s ease, background 0.2s ease;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .card:hover {
            transform: translateY(-6px);
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.16);
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.04);
            color: var(--text);
            text-decoration: none;
        }

        .card:active { transform: translateY(-2px); }

        .icon-wrap {
            width: 58px;
            height: 58px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .name {
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            line-height: 1.25;
        }

        .port {
            font-size: 0.68rem;
            color: var(--port-color);
            font-family: 'Courier New', monospace;
            letter-spacing: 0.03em;
        }

        /* ── Icon palette ── */
        .c-violet { background: linear-gradient(135deg, #5b21b6, #7c3aed); }
        .c-blue   { background: linear-gradient(135deg, #1d4ed8, #3b82f6); }
        .c-slate  { background: linear-gradient(135deg, #1e293b, #334155); }
        .c-navy   { background: linear-gradient(135deg, #1e3a5f, #1d4ed8); }
        .c-amber  { background: linear-gradient(135deg, #92400e, #d97706); }
        .c-orange { background: linear-gradient(135deg, #9a3412, #ea580c); }
        .c-rose   { background: linear-gradient(135deg, #881337, #e11d48); }
        .c-teal   { background: linear-gradient(135deg, #0f766e, #0d9488); }
        .c-green  { background: linear-gradient(135deg, #14532d, #16a34a); }

        /* ── Divider ── */
        .divider {
            border: none;
            border-top: 1px solid var(--divider);
            max-width: 960px;
            width: calc(100% - 3rem);
            margin: 2rem auto 1.5rem;
        }

        /* ── Storage section ── */
        .disk-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
            padding: 0 1.5rem;
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
        }

        .disk-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 1.25rem 1.25rem 1.1rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .disk-card.is-loading {
            opacity: 0.4;
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50%       { opacity: 0.2; }
        }

        .disk-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.2rem;
        }

        .disk-label {
            font-size: 0.875rem;
            font-weight: 600;
        }

        .disk-pct {
            font-size: 0.8rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .pct-green { color: #34d399; }
        .pct-amber { color: #fbbf24; }
        .pct-red   { color: #f87171; }

        .disk-device {
            font-size: 0.68rem;
            color: var(--muted);
            font-family: 'Courier New', monospace;
            margin-bottom: 0.75rem;
        }

        .disk-bar-track {
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 0.65rem;
        }

        .disk-bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.5s ease;
        }

        .disk-stats {
            font-size: 0.7rem;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
        }

        .disk-error-msg {
            font-size: 0.8rem;
            color: #f87171;
            text-align: center;
            padding: 0.5rem 0;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 1.75rem 1.5rem 1.5rem;
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: auto;
        }

        #disk-refresh {
            display: block;
            text-align: center;
            font-size: 0.68rem;
            color: var(--muted);
            margin: 0.75rem auto 0;
            max-width: 960px;
            padding: 0 1.5rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Frank's Media Server</h1>
    <div id="clock"></div>
</header>

<p class="section-label">Services</p>
<main>

    <a href="/admin" data-role="link" data-port="81" class="card">
        <div class="icon-wrap c-violet"><i class="fa-solid fa-shield-halved"></i></div>
        <span class="name">Pi-hole</span>
        <span class="port">:81</span>
    </a>

    <a href="/" data-role="link" data-port="8096" class="card">
        <div class="icon-wrap c-blue"><i class="fa-solid fa-circle-play"></i></div>
        <span class="name">Jellyfin</span>
        <span class="port">:8096</span>
    </a>

    <a href="/" data-role="link" data-port="9091" class="card">
        <div class="icon-wrap c-slate"><i class="fa-solid fa-download"></i></div>
        <span class="name">Transmission</span>
        <span class="port">:9091</span>
    </a>

    <a href="/" data-role="link" data-port="8989" class="card">
        <div class="icon-wrap c-navy"><i class="fa-solid fa-tv"></i></div>
        <span class="name">Sonarr</span>
        <span class="port">:8989</span>
    </a>

    <a href="/" data-role="link" data-port="7878" class="card">
        <div class="icon-wrap c-amber"><i class="fa-solid fa-film"></i></div>
        <span class="name">Radarr</span>
        <span class="port">:7878</span>
    </a>

    <a href="/" data-role="link" data-port="9117" class="card">
        <div class="icon-wrap c-orange"><i class="fa-solid fa-magnifying-glass"></i></div>
        <span class="name">Jackett</span>
        <span class="port">:9117</span>
    </a>

    <a href="/" data-role="link" data-port="8191" class="card">
        <div class="icon-wrap c-rose"><i class="fa-solid fa-fire-flame-curved"></i></div>
        <span class="name">Flaresolverr</span>
        <span class="port">:8191</span>
    </a>

    <a href="/" data-role="link" data-port="8123" class="card">
        <div class="icon-wrap c-teal"><i class="fa-solid fa-house-signal"></i></div>
        <span class="name">Home Assistant</span>
        <span class="port">:8123</span>
    </a>

    <a href="/" data-role="link" data-port="9000" class="card">
        <div class="icon-wrap c-green"><i class="fa-solid fa-network-wired"></i></div>
        <span class="name">Mosquitto</span>
        <span class="port">:9000</span>
    </a>

</main>

<hr class="divider">

<p class="section-label">Storage</p>
<div class="disk-grid" id="disk-grid">
    <div class="disk-card is-loading">
        <div class="disk-header"><span class="disk-label">System (NVMe)</span></div>
        <div class="disk-device">/dev/nvme0n1p2</div>
        <div class="disk-bar-track"><div class="disk-bar-fill" style="width:0%"></div></div>
        <div class="disk-stats"><span>—</span><span>—</span><span>—</span></div>
    </div>
    <div class="disk-card is-loading">
        <div class="disk-header"><span class="disk-label">Media (HDD)</span></div>
        <div class="disk-device">/dev/sda1</div>
        <div class="disk-bar-track"><div class="disk-bar-fill" style="width:0%"></div></div>
        <div class="disk-stats"><span>—</span><span>—</span><span>—</span></div>
    </div>
</div>
<span id="disk-refresh"></span>

<footer>
    <span id="host-hint"></span>
</footer>

<script>
    // Clock
    function tick() {
        const now = new Date();
        document.getElementById('clock').textContent =
            now.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' }) +
            '  ·  ' +
            now.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    tick();
    setInterval(tick, 1000);

    document.getElementById('host-hint').textContent = location.hostname;

    // Card navigation
    document.querySelectorAll('[data-role=link]').forEach((el) => {
        el.addEventListener('click', event => {
            event.preventDefault();
            const url = new URL(el.href, location.href);
            url.port = el.dataset.port;
            const tab = window.open(url.toString(), '_blank');
            if (tab) tab.focus();
        });
    });

    // Disk usage
    function fmt(mb) {
        if (mb >= 1024 * 1024) return (mb / 1024 / 1024).toFixed(1) + ' TB';
        if (mb >= 1024)        return (mb / 1024).toFixed(1) + ' GB';
        return mb.toFixed(0) + ' MB';
    }

    function barColor(pct) {
        if (pct >= 85) return 'linear-gradient(90deg, #7f1d1d, #ef4444)';
        if (pct >= 70) return 'linear-gradient(90deg, #78350f, #f59e0b)';
        return 'linear-gradient(90deg, #064e3b, #10b981)';
    }

    function pctClass(pct) {
        if (pct >= 85) return 'pct-red';
        if (pct >= 70) return 'pct-amber';
        return 'pct-green';
    }

    async function loadDiskUsage() {
        try {
            const res = await fetch('/cgi-bin/diskspace');
            if (!res.ok) throw new Error(res.status);
            const data = await res.json();

            document.getElementById('disk-grid').innerHTML = data.disks.map(d => {
                if (d.error) {
                    return `<div class="disk-card">
                        <div class="disk-header"><span class="disk-label">${d.label}</span></div>
                        <div class="disk-device">${d.device}</div>
                        <p class="disk-error-msg"><i class="fa-solid fa-triangle-exclamation"></i> Unavailable</p>
                    </div>`;
                }
                return `<div class="disk-card">
                    <div class="disk-header">
                        <span class="disk-label">${d.label}</span>
                        <span class="disk-pct ${pctClass(d.pct)}">${d.pct}%</span>
                    </div>
                    <div class="disk-device">${d.device}</div>
                    <div class="disk-bar-track">
                        <div class="disk-bar-fill" style="width:${d.pct}%;background:${barColor(d.pct)}"></div>
                    </div>
                    <div class="disk-stats">
                        <span>${fmt(d.free)} free</span>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('disk-refresh').textContent =
                'Updated at ' + new Date().toLocaleTimeString('nl-NL');
        } catch (e) {
            document.getElementById('disk-grid').innerHTML =
                '<p class="disk-error-msg" style="padding:1rem"><i class="fa-solid fa-triangle-exclamation"></i> Could not load disk data</p>';
        }
    }

    loadDiskUsage();
    setInterval(loadDiskUsage, 5 * 60 * 1000);
</script>

</body>
</html>
